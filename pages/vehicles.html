<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Vehicles | CarBiz Motors</title>
    <!-- Google Fonts -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">
    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet"
          href="../css/style.css">
    <link rel="stylesheet"
          href="../css/layout.css">
    <link rel="stylesheet"
          href="../css/components.css">
    <link rel="stylesheet"
          href="../css/pages.css">
    <link rel="stylesheet"
          href="../css/responsive.css">
</head>
<body>
    <!-- ===========================
         NAVIGATION
    ============================ -->
    <div id="navbar"></div>
    <!-- ===========================
         PAGE HEADER
    ============================ -->
    <section class="page-header">
        <div class="container">
            <h1>
                Available Vehicles
            </h1>
            <p>
                Browse our collection of quality new and used vehicles.
            </p>
        </div>
    </section>
    <!-- ===========================
         FILTERS
    ============================ -->
    <section class="page-content">
        <div class="container">
            <div class="vehicle-filters">
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search by make or model...">
                <select id="category-filter">
                    <option value="">All Categories</option>
                    <option value="SUV">SUV</option>
                    <option value="Sedan">Sedan</option>
                    <option value="MPV">MPV</option>
                    <option value="4x4">4x4</option>
                </select>
                <select id="fuel-filter">
                    <option value="">All Fuel Types</option>
                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                </select>
                <select id="sort-filter">
                    <option value="">Sort Vehicles</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="year">Newest First</option>
                </select>
            </div>
        </div>
    </section>
    <!-- ===========================
         RESULTS
    ============================ -->
    <section class="page-content">
        <div class="container">
            <div class="results-header">
                <h2 id="vehicle-count">
                    0 Vehicles Found
                </h2>
            </div>
            <div
                id="vehicle-grid"
                class="vehicle-grid">
            </div>
        </div>
    </section>
    <!-- ===========================
         CALL TO ACTION
    ============================ -->
    <section class="cta">
        <div class="container">
            <h2>
                Can't Find the Vehicle You're Looking For?
            </h2>
            <p>
                Contact us today and we'll help you source the perfect vehicle for your needs.
            </p>
            <a href="contact.html"
               class="btn btn-primary">
                Contact Us
            </a>
        </div>
    </section>
    <!-- ===========================
         FOOTER
    ============================ -->
    <!-- ===========================
     FOOTER
=========================== -->
<div id="footer"></div>
    <!-- ===========================
         JAVASCRIPT
    ============================ -->
    <script src="../js/data/vehicles.js"></script>
    <script src="../js/components/vehicleCard.js"></script>
    <script src="../js/pages/vehicles.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/components/components.js"></script>
</body>
</html>
